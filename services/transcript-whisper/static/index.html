<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transcript Whisper</title>
    <style>
      :root {
        --bg: #f6f2e9;
        --ink: #1c1b17;
        --muted: #6b6256;
        --accent: #d64a2b;
        --panel: #ffffff;
        --border: #e6dccd;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Georgia", "Times New Roman", serif;
        color: var(--ink);
        background: radial-gradient(circle at top left, #fff3d6, var(--bg));
      }
      header {
        padding: 32px 20px 12px;
        text-align: center;
      }
      header h1 {
        margin: 0 0 8px;
        font-size: 34px;
        letter-spacing: 0.5px;
      }
      header p {
        margin: 0;
        color: var(--muted);
      }
      main {
        max-width: 820px;
        margin: 0 auto;
        padding: 20px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 22px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }
      input[type="file"],
      select {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fffaf1;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .actions {
        margin-top: 18px;
        display: flex;
        gap: 12px;
        align-items: center;
      }
      button {
        background: var(--accent);
        color: white;
        border: none;
        padding: 12px 18px;
        border-radius: 999px;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .status {
        color: var(--muted);
      }
      textarea {
        width: 100%;
        min-height: 260px;
        margin-top: 18px;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fffaf1;
        font-family: "Courier New", Courier, monospace;
        font-size: 13px;
      }
      .hint {
        margin-top: 14px;
        font-size: 12px;
        color: var(--muted);
      }
      @media (max-width: 700px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Transcript Whisper</h1>
      <p>Upload a video file and get a TXT transcript.</p>
    </header>
    <main>
      <div class="card">
        <form id="upload-form">
          <label for="file">Video file</label>
          <input id="file" name="file" type="file" accept="video/*" required />

          <div class="row" style="margin-top: 16px;">
            <div>
              <label for="model">Model</label>
              <select id="model" name="model">
                <option value="tiny">tiny</option>
                <option value="base">base</option>
                <option value="small" selected>small</option>
                <option value="medium">medium</option>
                <option value="large">large</option>
              </select>
            </div>
            <div>
              <label for="task">Task</label>
              <select id="task" name="task">
                <option value="transcribe" selected>transcribe</option>
                <option value="translate">translate</option>
              </select>
            </div>
          </div>

          <div class="actions">
            <button id="submit-btn" type="submit">Transcribe</button>
            <span class="status" id="status">Idle</span>
          </div>

          <div class="hint">
            API endpoint: <code>/api/v1/transcriptions/upload</code>
          </div>
        </form>

        <textarea id="output" placeholder="Transcript appears here..." readonly></textarea>
      </div>
    </main>

    <script>
      const form = document.getElementById("upload-form");
      const statusEl = document.getElementById("status");
      const outputEl = document.getElementById("output");
      const submitBtn = document.getElementById("submit-btn");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const fileInput = document.getElementById("file");
        if (!fileInput.files.length) return;

        const formData = new FormData(form);
        statusEl.textContent = "Uploading...";
        submitBtn.disabled = true;
        outputEl.value = "";

        try {
          const res = await fetch("/api/v1/transcriptions/upload", {
            method: "POST",
            body: formData,
          });
          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || "Upload failed");
          }
          const data = await res.json();
          outputEl.value = data.text || "";
          statusEl.textContent = "Done";
        } catch (err) {
          statusEl.textContent = "Error";
          outputEl.value = err.message;
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
